# Scribe configuration
# ---------------------------------------------------------------
# LIVE DATA: uses Blockscout's free public API for Base (no key
# needed). An Etherscan key in .env is optional (paid tiers/other
# chains). To refresh facilitator wallets when they rotate:
#   python3 scribe.py refresh
# ---------------------------------------------------------------

chain:
  name: base
  chain_id: 8453
  api_base: "https://base.blockscout.com/api"
  usdc_contract: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"   # USDC on Base mainnet
  usdc_decimals: 6

# Facilitator registry source (community-maintained, x402scan):
facilitator_registry: "https://raw.githubusercontent.com/Merit-Systems/x402scan/main/packages/external/facilitators/src/facilitators/coinbase.ts"

# Coinbase x402 facilitator settlement wallets, newest first.
# Coinbase runs ~40 and rotates them; run `scribe.py refresh` when stale.
facilitators:
  # Newest Coinbase x402 facilitator wallets (auto-refreshed from x402scan registry)
  - "0x2a89407a98a0732b7fd578c4e156b7166540eb5a"   # first tx 2026-06-15
  - "0xe72f0af4cf41356d433723547f1412ca27fbb1b8"   # first tx 2026-06-12
  - "0xca5e87f82b3fa093800e6ad67d621a427d79c70d"   # first tx 2026-06-12
  - "0x4c934c63c786157fefd990945b25ea60a0fb0205"   # first tx 2026-06-12
  - "0x64cc42b1ce598e3abcfbb64df4688521ddbf1f0a"   # first tx 2026-06-12
  - "0xe74817f4cdc15844314812b2271276e64e890fae"   # first tx 2026-06-12


# Map payer wallets to agent names (unknown payers get short labels)
agents: {}

# Map seller wallets to label + category (unknown sellers land in
# the exception queue for classification)
providers: {}

accounting:
  asset_account: "1085 - Digital Assets (USDC)"
  anomaly_threshold_usd: 40.0
  expense_accounts:
    Market data:      "6410 - Data & Research Services"
    Mapping data:     "6410 - Data & Research Services"
    Risk data:        "6410 - Data & Research Services"
    AI inference:     "6420 - AI & Compute Services"
    Compute:          "6420 - AI & Compute Services"
    Document parsing: "6430 - Software Tooling"
    Uncategorized:    "6490 - Uncategorized Agent Spend"
